<template>
    <div class="slds-p-vertical_medium">
        <div class="slds-container_medium slds-container_center slds-p-horizontal_medium">
            <header class="claim-header slds-box slds-theme_default slds-p-around_none">
                <div class="slds-grid slds-wrap slds-grid_vertical-align-center">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12 slds-p-around_xx-large">
                        <h1 class="slds-text-heading_large">Add your claim documents</h1>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-p-around_medium">
                        <img
                            class="slds-size_1-of-1"
                            src={claimIllustrationUrl}
                            alt="Documents being sent securely"
                        />
                    </div>
                </div>
            </header>

            <main class="slds-box slds-theme_default slds-p-around_none slds-m-top_medium">
            <section class="slds-theme_shade slds-p-around_small slds-border_bottom" aria-labelledby="claim-details-heading">
                <div class="slds-grid slds-wrap slds-grid_align-spread slds-grid_vertical-align-center">
                    <div>
                        <p class="slds-text-title_caps slds-text-color_weak slds-m-bottom_xxx-small">
                            Claim number
                        </p>
                        <h2 id="claim-details-heading" class="slds-text-body_regular">
                            OC-2026-071842
                        </h2>
                    </div>
                    <lightning-badge class="slds-m-top_xx-small" label="Waiting for documents"></lightning-badge>
                </div>

                <dl class="slds-grid slds-wrap slds-gutters_x-small slds-m-top_small">
                    <div class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-form-element slds-form-element_readonly slds-form-element_stacked slds-form-element_1-col">
                        <dt class="slds-form-element__label">Date of incident</dt>
                        <dd class="slds-form-element__control">
                            <span class="slds-form-element__static slds-text-body_small">14 July 2026</span>
                        </dd>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-form-element slds-form-element_readonly slds-form-element_stacked slds-form-element_1-col">
                        <dt class="slds-form-element__label">Damaged vehicle</dt>
                        <dd class="slds-form-element__control">
                            <span class="slds-form-element__static slds-text-body_small">Toyota Corolla · WX 4827K</span>
                        </dd>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-form-element slds-form-element_readonly slds-form-element_stacked slds-form-element_1-col">
                        <dt class="slds-form-element__label">Claim type</dt>
                        <dd class="slds-form-element__control">
                            <span class="slds-form-element__static slds-text-body_small">Damage to your own vehicle</span>
                        </dd>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-small-size_1-of-2 slds-form-element slds-form-element_readonly slds-form-element_stacked slds-form-element_1-col">
                        <dt class="slds-form-element__label">Claim made against</dt>
                        <dd class="slds-form-element__control">
                            <span class="slds-form-element__static slds-text-body_small">Other driver’s OC insurance</span>
                        </dd>
                    </div>
                </dl>
            </section>

            <section class="slds-p-around_x-large" aria-labelledby="documents-heading">
                <h2 id="documents-heading" class="slds-text-heading_medium">Documents we need</h2>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                    Based on your earlier answers, these are the documents needed to continue with this claim.
                </p>

                <ul class="slds-m-top_large" aria-label="Required documents">
                    <template for:each={requiredDocuments} for:item="document">
                        <li key={document.key} class="slds-item slds-p-vertical_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon
                                    icon-name={document.iconName}
                                    size="small"
                                    alternative-text={document.label}
                                ></lightning-icon>
                                <h3 class="slds-text-heading_small slds-m-left_small">
                                    {document.titleForCustomer}
                                </h3>
                            </div>
                        </li>
                    </template>
                </ul>

                <div class="slds-border_top slds-m-top_large slds-p-top_large" aria-live="polite">
                    <template lwc:if={isEmptyState}>
                        <lightning-file-upload
                            label="Add requested documents"
                            name="claimDocuments"
                            accept={acceptedFileTypes}
                            record-id={recordId}
                            multiple
                            onuploadfinished={handleUploadFinished}
                        ></lightning-file-upload>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                            PDF, JPG, PNG or HEIC
                        </p>
                    </template>

                    <template lwc:elseif={isProcessing}>
                        <div class="slds-p-vertical_xx-large">
                            <div class="slds-is-relative slds-p-vertical_large">
                                <lightning-spinner
                                    alternative-text="Organizing documents"
                                    size="medium"
                                ></lightning-spinner>
                            </div>
                            <div class="slds-text-align_center slds-m-top_medium">
                                <h3 class="slds-text-heading_medium">Organizing your documents…</h3>
                            </div>
                        </div>
                    </template>

                    <template lwc:else>
                        <template lwc:if={showSubmissionConfirmation}>
                            <div
                                class="slds-notify slds-notify_alert slds-alert_success slds-m-top_large"
                                role="status"
                            >
                                <span class="slds-assistive-text">Success</span>
                                <lightning-icon
                                    icon-name="utility:success"
                                    size="x-small"
                                    variant="inverse"
                                    alternative-text="Success"
                                ></lightning-icon>
                                <h3 class="slds-m-horizontal_small">
                                    Ready for claims review. Nothing was sent—this is a preview.
                                </h3>
                                <lightning-button-icon
                                    icon-name="utility:close"
                                    variant="bare-inverse"
                                    alternative-text="Dismiss"
                                    title="Dismiss"
                                    onclick={dismissConfirmation}
                                ></lightning-button-icon>
                            </div>
                        </template>

                        <ul class="slds-has-dividers_bottom-space slds-m-top_large" aria-label="Added documents">
                            <template for:each={displayFiles} for:item="file">
                                <li key={file.id} class="slds-item slds-p-vertical_large">
                                    <article class="slds-media">
                                        <div class="slds-media__figure">
                                            <lightning-icon
                                                icon-name={file.iconName}
                                                size="medium"
                                                alternative-text="Document"
                                            ></lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start">
                                                <div class="slds-has-flexi-truncate">
                                                    <h4 class="slds-text-heading_small slds-truncate" title={file.name}>
                                                        {file.name}
                                                    </h4>
                                                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                                        {file.fileDetailLabel}
                                                    </p>
                                                </div>
                                                <lightning-button-icon
                                                    class="slds-m-left_small"
                                                    icon-name="utility:delete"
                                                    alternative-text="Remove document"
                                                    title="Remove document"
                                                    data-id={file.id}
                                                    disabled={file.isDeleting}
                                                    onclick={handleRemove}
                                                ></lightning-button-icon>
                                            </div>

                                            <div class="slds-m-top_large">
                                                <lightning-combobox
                                                    label="Choose category"
                                                    placeholder="Select a category"
                                                    value={file.category}
                                                    options={categoryOptions}
                                                    data-id={file.id}
                                                    onchange={handleCategoryChange}
                                                ></lightning-combobox>
                                                <template lwc:if={file.detectedAutomatically}>
                                                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                                                        Detected automatically
                                                    </p>
                                                </template>
                                                <template lwc:if={file.needsReview}>
                                                    <div class="slds-m-top_small">
                                                        <lightning-badge label="Please check"></lightning-badge>
                                                        <lightning-helptext
                                                            content="We’re not fully sure—please choose or confirm the category."
                                                        ></lightning-helptext>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </article>
                                </li>
                            </template>
                        </ul>

                        <div class="slds-m-top_x-large">
                            <lightning-file-upload
                                label="Add documents"
                                name="additionalClaimDocuments"
                                accept={acceptedFileTypes}
                                record-id={recordId}
                                multiple
                                onuploadfinished={handleUploadFinished}
                            ></lightning-file-upload>
                        </div>

                        <lightning-button
                            class="slds-m-top_x-large"
                            label="Send for review"
                            variant="brand"
                            icon-name="utility:forward"
                            icon-position="right"
                            onclick={handleSubmit}
                        ></lightning-button>

                        <div class="slds-media slds-m-top_x-large">
                            <div class="slds-media__figure">
                                <lightning-icon
                                    icon-name="utility:info"
                                    size="x-small"
                                    alternative-text="Information"
                                ></lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <p class="slds-text-body_small slds-text-color_weak">
                                    Suggested categories help route your documents. A claims specialist makes the final assessment.
                                </p>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
            </main>
        </div>
    </div>
</template>
